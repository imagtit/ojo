<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Dreiko TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

width:100%;
height:100%;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
background:#001b5c;

}

body{

display:flex;
justify-content:center;
align-items:center;

}

#contenedor{

position:relative;

width:min(900px,92vw);

aspect-ratio:1;

}

#tv{

position:absolute;

left:0;
top:0;

width:100%;
height:100%;

z-index:10;

pointer-events:none;

user-select:none;

}

/* VIDEO */

#liveVideo{

position:absolute;

/* AJUSTE DE LA PANTALLA */

left:12.6%;
top:36.25%;

width:46.8%;
height:32.4%;

background:#000;

object-fit:cover;

border-radius:18px;

z-index:5;

}

/* BOTONES */

#panel{

position:fixed;

right:30px;

top:50%;

transform:translateY(-50%);

display:flex;

flex-direction:column;

gap:18px;

z-index:9999;

}

#panel button{

width:70px;

height:70px;

border:none;

border-radius:50%;

background:#ff1f72;

color:#fff;

font-size:30px;

cursor:pointer;

transition:.25s;

box-shadow:0 8px 20px rgba(0,0,0,.45);

}

#panel button:hover{

transform:scale(1.08);

}

@media(max-width:700px){

#contenedor{

width:96vw;

}

#panel{

right:10px;

}

#panel button{

width:56px;
height:56px;
font-size:24px;

}

}

</style>

</head>

<body>

<div id="contenedor">

<video
id="liveVideo"
autoplay
muted
playsinline>
</video>

<img
id="tv"
src="tv.png">

</div>

<div id="panel">

<button id="soundBtn">🔇</button>

<button id="playBtn">⏸</button>

</div>

<script>

const video=document.getElementById("liveVideo");
const soundBtn=document.getElementById("soundBtn");
const playBtn=document.getElementById("playBtn");

const url="https://rtv.fullhd-streaming.com:19360/dreikotv/dreikotv.m3u8";

if (Hls.isSupported()) {

    const hls = new Hls({
        enableWorker: true,
        lowLatencyMode: true,
        backBufferLength: 90
    });

    hls.loadSource(url);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, function () {

        video.play().catch(()=>{});

    });

} else if (video.canPlayType("application/vnd.apple.mpegurl")) {

    video.src = url;

    video.addEventListener("loadedmetadata", function () {

        video.play().catch(()=>{});

    });

}

video.volume=1;

soundBtn.addEventListener("pointerdown", function(e){

    e.preventDefault();

    video.muted = !video.muted;

    soundBtn.innerHTML = video.muted ? "🔇" : "🔊";

    video.play().catch(()=>{});

});

playBtn.onclick=function(){

    if(video.paused){

        video.play();

        playBtn.innerHTML="⏸";

    }else{

        video.pause();

        playBtn.innerHTML="▶";

    }

};

video.onplay=function(){

    playBtn.innerHTML="⏸";

};

video.onpause=function(){

    playBtn.innerHTML="▶";

};

video.onended=function(){

    video.play();

};

video.addEventListener("waiting",()=>{

    document.body.style.cursor="progress";

});

video.addEventListener("playing",()=>{

    document.body.style.cursor="default";

});

video.addEventListener("error",()=>{

    console.log("Reconectando...");

    setTimeout(()=>{

        if(Hls.isSupported()){

            const hls=new Hls();

            hls.loadSource(url);

            hls.attachMedia(video);

        }else{

            video.src=url;

        }

    },3000);

});

/* Mantener el stream activo */

setInterval(()=>{

    if(video.paused && !document.hidden){

        video.play().catch(()=>{});

    }

},5000);

/* Doble clic para pantalla completa */

video.addEventListener("dblclick",()=>{

    if(document.fullscreenElement){

        document.exitFullscreen();

    }else{

        document.documentElement.requestFullscreen();

    }

});

/* Tecla espacio = play/pause */

document.addEventListener("keydown",(e)=>{

    if(e.code==="Space"){

        e.preventDefault();

        playBtn.click();

    }

});

/* Tecla M = sonido */

document.addEventListener("keydown",(e)=>{

    if(e.key==="m" || e.key==="M"){

        soundBtn.click();

    }

});

window.addEventListener("load",()=>{

    video.play().catch(()=>{});

});

/* Mantener relación de aspecto */

window.addEventListener("resize",()=>{

    video.style.objectFit="cover";

});

/* Evita que aparezcan los controles del navegador */

video.controls=false;

</script>

</body>

</html>
